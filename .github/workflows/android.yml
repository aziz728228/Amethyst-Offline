name: Android CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # HATA ÇÖZÜMÜ: Eski eylem yerine doğrudan script ile indirme
      - name: Download JREs
        run: |
          mkdir -p Amethyst-Android/app_pojavlauncher/src/main/assets/components/jre
          mkdir -p Amethyst-Android/app_pojavlauncher/src/main/assets/components/jre-new
          mkdir -p Amethyst-Android/app_pojavlauncher/src/main/assets/components/jre-21
          mkdir -p Amethyst-Android/app_pojavlauncher/src/main/assets/components/jre-25
          
          echo "JRE'ler indiriliyor..."
          # Not: Bu kısımda GitHub API limitlerine takılmamak için 
          # ilgili repoların public artifact linklerini kullanmanız veya 
          # depodaki build sistemini güncellemeniz önerilir.
          # Eğer bu komut da hata verirse, artifact linkleri kalıcı olarak silinmiştir.

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11"

      - name: Build JRE JAR files
        run: |
          cd Amethyst-Android
          ./scripts/languagelist_updater.sh
          mkdir -p out
          gradle :jre_lwjgl3glfw:build --no-daemon

      - name: Patch files
        run: |
          patch ./Amethyst-Android/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/tasks/MinecraftDownloader.java MinecraftDownloader.patch
          patch ./Amethyst-Android/app_pojavlauncher/src/main/java/net/kdt/pojavlaunch/Tools.java Tools.patch
          
      - name: Build Debug .apk
        run: |
          cd Amethyst-Android
          gradle :app_pojavlauncher:assembleDebug
          mv app_pojavlauncher/build/outputs/apk/debug/app_pojavlauncher-debug.apk out/app-debug.apk
          
      - name: Gen md5sums
        run: |
          cd Amethyst-Android
          md5sum out/app-debug.apk > out/app-debug.md5
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Amethyst-Android/out/app-debug.*
